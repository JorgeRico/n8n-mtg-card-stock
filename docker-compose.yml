services:
  n8n:
    build: .
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - NODE_ENV=production
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-UTC}
      - DB_TYPE=mysql
      - DB_MYSQLDB_HOST=mysql
      - DB_MYSQLDB_PORT=3306
      - DB_MYSQLDB_DATABASE=${MYSQL_DATABASE:-n8n}
      - DB_MYSQLDB_USER=${MYSQL_USER:-n8n}
      - DB_MYSQLDB_PASSWORD=${MYSQL_PASSWORD:-n8n}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n_network
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: n8n_mysql
    restart: unless-stopped
    command: --bind-address 0.0.0.0
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-n8n}
      - MYSQL_USER=${MYSQL_USER:-n8n}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-n8n}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - n8n_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: n8n_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=${MYSQL_USER:-n8n}
      - PMA_PASSWORD=${MYSQL_PASSWORD:-n8n}
      - UPLOAD_LIMIT=100M
    networks:
      - n8n_network
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  n8n_data:
  mysql_data:

networks:
  n8n_network:
    driver: bridge
